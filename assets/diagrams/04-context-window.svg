<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" role="img" aria-label="Context window desk metaphor with document filtering">
  <defs>
    <marker id="d04a" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#6366f1"/></marker>
  </defs>
  <rect width="900" height="360" fill="#f8fafc" rx="12"/>
  <text x="450" y="36" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" font-weight="700" fill="#0f172a">Context engineering - the desk metaphor</text>
  <text x="120" y="80" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#64748b">INCOMING (noisy)</text>
  <g opacity="0.85" font-size="8">
    <rect x="40" y="95" width="55" height="40" rx="4" fill="#fee2e2" stroke="#fca5a5"/><text x="67" y="120" text-anchor="middle" fill="#991b1b">memes</text>
    <rect x="100" y="100" width="55" height="40" rx="4" fill="#fef3c7" stroke="#fcd34d"/><text x="127" y="122" text-anchor="middle" fill="#92400e">old logs</text>
    <rect x="55" y="145" width="55" height="40" rx="4" fill="#d1fae5" stroke="#6ee7b7"/><text x="82" y="168" text-anchor="middle" fill="#065f46">error log</text>
    <rect x="115" y="150" width="55" height="40" rx="4" fill="#fee2e2" stroke="#fca5a5"/><text x="142" y="170" text-anchor="middle" fill="#991b1b">50k files</text>
    <rect x="75" y="195" width="55" height="40" rx="4" fill="#d1fae5" stroke="#6ee7b7"/><text x="102" y="218" text-anchor="middle" fill="#065f46">test.py</text>
  </g>
  <path d="M 200 130 L 250 170 L 200 210 Z" fill="#6366f1" opacity="0.2" stroke="#6366f1"/>
  <text x="225" y="175" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#4338ca">FILTER</text>
  <text x="225" y="240" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#94a3b8">irrelevant discarded</text>
  <rect x="280" y="90" width="380" height="200" rx="8" fill="#d6d3d1" stroke="#a8a29e"/>
  <rect x="290" y="100" width="360" height="180" rx="4" fill="#fafaf9" stroke="#e7e5e4"/>
  <text x="470" y="82" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#57534e">CONTEXT WINDOW (limited desk space)</text>
  <rect x="310" y="120" width="100" height="55" rx="6" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  <text x="360" y="145" text-anchor="middle" font-size="9" font-weight="600" fill="#047857">Failing test log</text>
  <text x="360" y="160" text-anchor="middle" font-size="8" fill="#059669">relevant</text>
  <rect x="420" y="120" width="100" height="55" rx="6" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  <text x="470" y="145" text-anchor="middle" font-size="9" font-weight="600" fill="#047857">test_login.py</text>
  <rect x="530" y="120" width="100" height="55" rx="6" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  <text x="580" y="145" text-anchor="middle" font-size="9" font-weight="600" fill="#047857">Style guide</text>
  <rect x="310" y="190" width="320" height="70" rx="6" fill="#eef2ff" stroke="#818cf8"/>
  <text x="470" y="218" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#4338ca">Summarized chat history (compressed)</text>
  <text x="470" y="238" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#6366f1">Start and end of context get most attention</text>
  <path d="M 670 190 L 720 190" stroke="#6366f1" stroke-width="2" marker-end="url(#d04a)"/>
  <rect x="730" y="155" width="120" height="70" rx="12" fill="#4f46e5"/>
  <text x="790" y="188" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#fff">LLM</text>
  <text x="790" y="208" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#c7d2fe">focused answer</text>
  <text x="450" y="330" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">Context engineering = curate what fits on the desk, in the right order</text>
</svg>
