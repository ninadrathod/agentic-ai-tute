<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" role="img" aria-label="MVP evolution and popular AI tool categories">
  <rect width="900" height="380" fill="#f8fafc" rx="12"/>
  <text x="225" y="32" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="700" fill="#0f172a">MVP evolution</text>
  <text x="675" y="32" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="700" fill="#0f172a">Popular AI tools (by category)</text>
  <line x1="450" y1="50" x2="450" y2="360" stroke="#e2e8f0" stroke-width="2"/>
  <g font-family="system-ui,sans-serif" font-size="10">
    <text x="60" y="80" fill="#64748b">Goal: get from A to B</text>
    <rect x="40" y="95" width="80" height="50" rx="8" fill="#d1fae5" stroke="#10b981"/><text x="80" y="125" text-anchor="middle" font-weight="600" fill="#047857">Skateboard</text>
    <text x="130" y="125" font-size="14" fill="#94a3b8">-&gt;</text>
    <rect x="145" y="95" width="80" height="50" rx="8" fill="#ecfdf5" stroke="#6ee7b7"/><text x="185" y="125" text-anchor="middle" font-weight="600" fill="#059669">Scooter</text>
    <text x="235" y="125" font-size="14" fill="#94a3b8">-&gt;</text>
    <rect x="250" y="95" width="80" height="50" rx="8" fill="#eef2ff" stroke="#818cf8"/><text x="290" y="125" text-anchor="middle" font-weight="600" fill="#4338ca">Bicycle</text>
    <text x="340" y="125" font-size="14" fill="#94a3b8">-&gt;</text>
    <rect x="355" y="95" width="80" height="50" rx="8" fill="#4f46e5"/><text x="395" y="125" text-anchor="middle" font-weight="600" fill="#fff">Car</text>
    <rect x="40" y="165" width="395" height="70" rx="8" fill="#fef3c7" stroke="#fcd34d"/>
    <text x="237" y="190" text-anchor="middle" font-weight="600" fill="#92400e">Half-built car = zero value today</text>
    <text x="237" y="210" text-anchor="middle" fill="#b45309">MVP = ship usable value, learn, iterate</text>
    <rect x="40" y="250" width="395" height="100" rx="8" fill="#fff" stroke="#cbd5e1"/>
    <text x="60" y="275" font-weight="700" fill="#334155">MVP spec includes:</text>
    <text x="60" y="295" fill="#64748b">Problem and goal, core features only</text>
    <text x="60" y="312" fill="#64748b">User stories, acceptance criteria</text>
    <text x="60" y="329" fill="#64748b">Out of scope (keeps agents focused)</text>
    <rect x="480" y="70" width="380" height="55" rx="8" fill="#eef2ff" stroke="#818cf8"/>
    <text x="500" y="92" font-weight="700" fill="#4338ca">Chat / models</text>
    <text x="500" y="110" fill="#64748b">ChatGPT, Claude, Gemini</text>
    <rect x="480" y="135" width="380" height="55" rx="8" fill="#ecfdf5" stroke="#6ee7b7"/>
    <text x="500" y="157" font-weight="700" fill="#047857">AI coding IDEs</text>
    <text x="500" y="175" fill="#64748b">Cursor, GitHub Copilot, Windsurf</text>
    <rect x="480" y="200" width="380" height="55" rx="8" fill="#f1f5f9" stroke="#94a3b8"/>
    <text x="500" y="222" font-weight="700" fill="#475569">Agent frameworks</text>
    <text x="500" y="240" fill="#64748b">LangChain, LlamaIndex, CrewAI, AutoGen</text>
    <rect x="480" y="265" width="380" height="55" rx="8" fill="#fef3c7" stroke="#fcd34d"/>
    <text x="500" y="287" font-weight="700" fill="#92400e">CI/CD platforms</text>
    <text x="500" y="305" fill="#64748b">GitHub Actions, GitLab CI, Jenkins, CircleCI</text>
    <rect x="480" y="330" width="380" height="40" rx="8" fill="#fce7f3" stroke="#f9a8d4"/>
    <text x="500" y="352" font-weight="700" fill="#9d174d">RAG / vector DBs</text>
    <text x="640" y="352" fill="#64748b">Pinecone, Weaviate, Chroma, pgvector</text>
  </g>
</svg>
