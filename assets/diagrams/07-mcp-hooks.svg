<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" role="img" aria-labelledby="title desc">
  <title id="title">MCP hub and CI/CD hooks</title>
  <desc id="desc">MCP as USB-C hub for tools; hooks on pipeline events</desc>
  <rect width="900" height="380" fill="#f8fafc" rx="12"/>
  <text x="225" y="32" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="700" fill="#0f172a">MCP  universal tool connector</text>
  <text x="675" y="32" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="700" fill="#0f172a">Hooks  event triggers</text>
  <line x1="450" y1="50" x2="450" y2="360" stroke="#e2e8f0" stroke-width="2"/>
  <!-- MCP side -->
  <rect x="170" y="70" width="110" height="60" rx="12" fill="#4f46e5"/>
  <text x="225" y="98" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#fff">AI Agent</text>
  <text x="225" y="118" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#c7d2fe">MCP client</text>
  <line x1="225" y1="130" x2="225" y2="160" stroke="#6366f1" stroke-width="2"/>
  <rect x="175" y="160" width="100" height="50" rx="25" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
  <text x="225" y="190" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#4338ca">MCP Hub</text>
  <text x="225" y="230" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#64748b">like USB-C</text>
  <g>
    <line x1="225" y1="210" x2="80" y2="270" stroke="#94a3b8" stroke-width="1.5"/>
    <rect x="20" y="260" width="100" height="50" rx="8" fill="#fff" stroke="#cbd5e1"/>
    <text x="70" y="285" text-anchor="middle" font-size="10" fill="#334155">GitHub</text>
    <text x="70" y="300" text-anchor="middle" font-size="8" fill="#64748b">MCP server</text>
    <line x1="225" y1="210" x2="225" y2="270" stroke="#94a3b8" stroke-width="1.5"/>
    <rect x="175" y="260" width="100" height="50" rx="8" fill="#fff" stroke="#cbd5e1"/>
    <text x="225" y="285" text-anchor="middle" font-size="10" fill="#334155">Database</text>
    <line x1="225" y1="210" x2="370" y2="270" stroke="#94a3b8" stroke-width="1.5"/>
    <rect x="320" y="260" width="100" height="50" rx="8" fill="#fff" stroke="#cbd5e1"/>
    <text x="370" y="285" text-anchor="middle" font-size="10" fill="#334155">File system</text>
  </g>
  <!-- Hooks side -->
  <g font-family="system-ui,sans-serif" font-size="10">
    <rect x="500" y="70" width="340" height="40" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
    <text x="520" y="95" fill="#334155">git commit</text>
    <path d="M 670 110 L 670 130" stroke="#6366f1" stroke-width="2" marker-end="url(#h)"/>
    <rect x="580" y="130" width="180" height="36" rx="8" fill="#fef3c7" stroke="#fbbf24"/>
    <text x="670" y="153" text-anchor="middle" font-weight="600" fill="#92400e">pre-commit hook</text>
    <text x="670" y="178" text-anchor="middle" font-size="9" fill="#64748b">lint · secrets scan</text>

    <rect x="500" y="200" width="340" height="40" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
    <text x="520" y="225" fill="#334155">tests complete</text>
    <path d="M 670 240 L 670 260" stroke="#10b981" stroke-width="2" marker-end="url(#h)"/>
    <rect x="580" y="260" width="180" height="36" rx="8" fill="#d1fae5" stroke="#34d399"/>
    <text x="670" y="283" text-anchor="middle" font-weight="600" fill="#047857">post-test hook</text>
    <text x="670" y="308" text-anchor="middle" font-size="9" fill="#64748b">format code · notify team</text>

    <rect x="500" y="320" width="340" height="40" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
    <text x="520" y="345" fill="#334155">agent edits file</text>
    <rect x="580" y="355" width="180" height="0" rx="0" fill="none"/>
  </g>
  <rect x="580" y="330" width="180" height="36" rx="8" fill="#fee2e2" stroke="#f87171"/>
  <text x="670" y="353" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#dc2626">guardrail hook  block risky edit</text>
  <defs><marker id="h" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#6366f1"/></marker></defs>
</svg>
