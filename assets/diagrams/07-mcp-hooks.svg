  <line x1="225" y1="210" x2="225" y2="270" stroke="#94a3b8" stroke-width="1.5"/>
  <rect x="175" y="260" width="100" height="50" rx="8" fill="#fff" stroke="#cbd5e1"/>
  <text x="225" y="290" text-anchor="middle" font-size="10" fill="#334155">Database</text>
  <line x1="225" y1="210" x2="370" y2="270" stroke="#94a3b8" stroke-width="1.5"/>
  <rect x="320" y="260" width="100" height="50" rx="8" fill="#fff" stroke="#cbd5e1"/>
  <text x="370" y="290" text-anchor="middle" font-size="10" fill="#334155">File system</text>
