<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" role="img" aria-label="Vague prompt versus structured prompt comparison">
  <rect width="900" height="380" fill="#f8fafc" rx="12"/>
  <text x="450" y="36" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" font-weight="700" fill="#0f172a">Vague prompt vs. structured prompt</text>
  <rect x="30" y="60" width="400" height="300" rx="10" fill="#fff" stroke="#fecaca"/>
  <text x="230" y="88" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#dc2626">Vague prompt</text>
  <rect x="50" y="100" width="360" height="70" rx="8" fill="#fef2f2" stroke="#fca5a5"/>
  <text x="70" y="125" font-family="system-ui,sans-serif" font-size="12" fill="#7f1d1d">Fix my code.</text>
  <text x="70" y="155" font-family="system-ui,sans-serif" font-size="10" fill="#b91c1c">No role, no context, no format</text>
  <text x="230" y="200" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#64748b">OUTPUT</text>
  <rect x="50" y="210" width="360" height="130" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="70" y="235" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">Sure! Code can have many issues. You</text>
  <text x="70" y="252" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">might want to check syntax, logic, or</text>
  <text x="70" y="269" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">dependencies. Consider refactoring...</text>
  <text x="70" y="300" font-family="system-ui,sans-serif" font-size="10" fill="#dc2626" font-weight="600">Generic, unusable for automation</text>
  <rect x="470" y="60" width="400" height="300" rx="10" fill="#fff" stroke="#6ee7b7"/>
  <text x="670" y="88" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#047857">Structured prompt</text>
  <rect x="490" y="100" width="360" height="120" rx="8" fill="#ecfdf5" stroke="#6ee7b7"/>
  <text x="510" y="122" font-family="system-ui,sans-serif" font-size="10" fill="#065f46" font-weight="700">Role:</text><text x="555" y="122" font-family="system-ui,sans-serif" font-size="10" fill="#065f46"> Expert Python reviewer</text>
  <text x="510" y="140" font-family="system-ui,sans-serif" font-size="10" fill="#065f46" font-weight="700">Task:</text><text x="550" y="140" font-family="system-ui,sans-serif" font-size="10" fill="#065f46"> Find bug in test_login.py</text>
  <text x="510" y="158" font-family="system-ui,sans-serif" font-size="10" fill="#065f46" font-weight="700">Context:</text><text x="565" y="158" font-family="system-ui,sans-serif" font-size="10" fill="#065f46"> [failing test log]</text>
  <text x="510" y="176" font-family="system-ui,sans-serif" font-size="10" fill="#065f46" font-weight="700">Format:</text><text x="560" y="176" font-family="system-ui,sans-serif" font-size="10" fill="#065f46"> JSON with file, line, fix</text>
  <text x="510" y="200" font-family="system-ui,sans-serif" font-size="9" fill="#059669">System prompt: never deploy without approval</text>
  <text x="670" y="240" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#64748b">OUTPUT</text>
  <rect x="490" y="250" width="360" height="90" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="510" y="275" font-family="ui-monospace,monospace" font-size="10" fill="#334155">{file:test_login.py, line:42,</text>
  <text x="510" y="292" font-family="ui-monospace,monospace" font-size="10" fill="#334155"> fix:assert user.id == expected}</text>
  <text x="510" y="320" font-family="system-ui,sans-serif" font-size="10" fill="#047857" font-weight="600">Specific, actionable, machine-readable</text>
</svg>
